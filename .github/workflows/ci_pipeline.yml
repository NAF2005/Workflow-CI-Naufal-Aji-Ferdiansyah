name: CI Pipeline MLOps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow

      - name: Debug Folder Structure
        run: |
          pwd
          ls -R

      - name: Run Training
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          cd MLProject
          python modelling.py

      - name: Verify MLruns
        run: |
          cd MLProject
          ls -R mlruns

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get Run ID
        run: |
          cd MLProject
          echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          cd MLProject

          EXP_ID=$(find mlruns -mindepth 1 -maxdepth 1 -type d | head -n 1 | xargs basename)

          echo "Experiment ID = $EXP_ID"
          echo "Run ID = $RUN_ID"

          mlflow models build-docker \
            -m "mlruns/$EXP_ID/$RUN_ID/artifacts/model" \
            -n "${{ secrets.DOCKER_USERNAME }}/wine-model:latest"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/wine-model:latest"