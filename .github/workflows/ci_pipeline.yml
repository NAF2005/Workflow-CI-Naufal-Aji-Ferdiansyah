name: CI Pipeline MLOps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Ubah runner utama ke Python 3.10 agar serasi

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow==2.17.2

      - name: Run Training
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          cd MLProject
          python modelling.py

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          cd MLProject

          EXP_ID=$(ls mlruns | grep -E '^[0-9]+$' | head -n 1)
          
          RUN_ID=$(ls mlruns/$EXP_ID | grep -v "meta.yaml" | head -n 1)

          echo "Experiment ID = $EXP_ID"
          echo "Run ID = $RUN_ID"

          mlflow models build-docker \
            -m "mlruns/$EXP_ID/$RUN_ID/artifacts/model" \
            -n "${{ secrets.DOCKER_USERNAME }}/wine-model:latest" \
            --env-manager=local

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/wine-model:latest"