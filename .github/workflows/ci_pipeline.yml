name: MLOps CI Retraining Workflow

on:
  push:
    branches: [ main, master ]

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies from Conda Specs
      run: |
        pip install mlflow==2.17.2 pandas==2.2.3 scikit-learn==1.6.1 numpy==2.0.2 cloudpickle==3.1.2 psutil==7.2.2 scipy==1.13.1

    - name: Run MLflow Project Retraining
      run: |
        mlflow run ./MLProject --experiment-name "Wine Quality Basic" --env-manager local

    - name: Upload Training Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-retrain-artifacts
        path: |
          mlruns/
          run_id.txt
          experiment_id.txt

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./MLProject
        file: ./MLProject/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/wine-quality-predict:latest