name: CI Pipeline MLOps

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow==2.17.2

      - name: Clean MLruns
        run: |
          cd MLProject
          rm -rf mlruns || true

      - name: Run Training
        run: |
          cd MLProject
          python modelling.py

      - name: Check Files
        run: |
          cd MLProject
          ls -la

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          cd MLProject
          docker build -t ${{ secrets.DOCKER_USERNAME }}/wine-model:latest .

      - name: Show Docker Images
        run: |
          docker images

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/wine-model:latest