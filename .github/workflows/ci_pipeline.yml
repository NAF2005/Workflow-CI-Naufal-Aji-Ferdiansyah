name: CI Pipeline MLOps (Docker Build)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn mlflow

    - name: Run Model Training
      run: |
        # Masuk ke folder MLProject untuk menjalankan model
        cd MLProject
        
        python modelling.py

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        cd MLProject
        
        RUN_ID=$(ls mlruns/0 | grep -v meta.yaml | head -n 1)
        echo "Ditemukan RUN_ID: $RUN_ID"
        
        mlflow models build-docker -m "mlruns/0/$RUN_ID/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/wine-model:latest"
        
        docker push "${{ secrets.DOCKER_USERNAME }}/wine-model:latest"